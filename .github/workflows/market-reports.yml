# Market agent — scheduled email reports (GitHub Actions)
#
# Required repository secrets:
#   RESEND_API_KEY  — Resend API key
#   EMAIL_FROM        — e.g. "Market Agent <reports@yourdomain.com>"
#   EMAIL_TO          — recipient address
#
# Optional secrets (defaults shown):
#   AGENT_MODE=pipeline
#
# Cron uses UTC. Each slot has two cron lines (EDT + EST). scripts/scheduled_run.py
# verifies the current Eastern time is within ±20 minutes of the target before sending.

name: Market Reports

on:
  schedule:
    # Daily AM — 11:30 ET (15:30 UTC EDT / 16:30 UTC EST), Mon–Fri
    - cron: "30 15 * * 1-5"
    - cron: "30 16 * * 1-5"
    # Daily PM — 19:04 ET (23:04 UTC EDT / 00:04 UTC EST next day)
    - cron: "4 23 * * 1-5"
    - cron: "4 0 * * 2-6"
    # Weekly — Saturday 10:06 ET (14:06 UTC EDT / 15:06 UTC EST)
    - cron: "6 14 * * 6"
    - cron: "6 15 * * 6"
    # Monthly — last day 19:00 ET (23:00 UTC EDT; 00:00 UTC next day EST)
    - cron: "0 23 28-31 * *"
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Report slot to run"
        required: true
        type: choice
        options:
          - daily-am
          - daily-pm
          - weekly
          - monthly
      force:
        description: "Skip ET time/day gates (manual test)"
        required: false
        type: boolean
        default: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
          else
            # Reuse ET ±20 min windows from scripts/scheduled_run.py (handles cron queue delay).
            SLOT=$(python -c "
          import sys
          sys.path.insert(0, '.')
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from scripts.scheduled_run import _slot_config, _in_time_window
          now = datetime.now(ZoneInfo('America/New_York'))
          best = None
          best_delta = None
          for slot in ('daily-am', 'daily-pm', 'weekly', 'monthly'):
              cfg = _slot_config(slot)
              target = now.replace(hour=cfg['hour'], minute=cfg['minute'], second=0, microsecond=0)
              delta = abs((now - target).total_seconds())
              if delta <= 20 * 60 and (best_delta is None or delta < best_delta):
                  best = slot
                  best_delta = delta
          print(best or 'unknown')
          ")
            echo "name=$SLOT" >> "$GITHUB_OUTPUT"
            echo "force=false" >> "$GITHUB_OUTPUT"
            echo "Resolved slot $SLOT"
          fi

      - name: Run market pipeline
        if: steps.slot.outputs.name != 'unknown'
        env:
          AGENT_MODE: pipeline
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          FORCE_FLAG=""
          if [ "${{ steps.slot.outputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/scheduled_run.py "${{ steps.slot.outputs.name }}" $FORCE_FLAG

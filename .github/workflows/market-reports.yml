# Market agent — scheduled email reports (GitHub Actions)
#
# Required repository secrets:
#   RESEND_API_KEY  — Resend API key
#   EMAIL_FROM        — e.g. "Market Agent <reports@yourdomain.com>"
#   EMAIL_TO          — recipient address
#
# Cron uses UTC (dual lines for DST). Scheduled runs use calendar-based slot
# detection because GitHub cron often starts 30–90+ minutes late.

name: Market Reports

on:
  schedule:
    # Daily AM — 11:30 ET (15:30 UTC EDT / 16:30 UTC EST), Mon–Fri
    - cron: "30 15 * * 1-5"
    - cron: "30 16 * * 1-5"
    # Daily PM — 19:04 ET (23:04 UTC EDT / 00:04 UTC EST next day)
    - cron: "4 23 * * 1-5"
    - cron: "4 0 * * 2-6"
    # Weekly — Saturday 2:45 PM Central (19:45 UTC CDT / 20:45 UTC CST)
    - cron: "45 19 * * 6"
    - cron: "45 20 * * 6"
    # Monthly — last day 19:00 ET (23:00 UTC EDT; 00:00 UTC next day EST)
    - cron: "0 23 28-31 * *"
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Report slot to run"
        required: true
        type: choice
        options:
          - daily-am
          - daily-pm
          - weekly
          - monthly
      force:
        description: "Skip ET time/day gates (manual test)"
        required: false
        type: boolean
        default: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WEEKLY_SCHEDULE_HOUR: "15"
      WEEKLY_SCHEDULE_MINUTE: "45"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            echo "trust=false" >> "$GITHUB_OUTPUT"
          else
            SLOT=$(python -c "
          import sys
          sys.path.insert(0, '.')
          from scripts.scheduled_run import resolve_schedule_slot
          print(resolve_schedule_slot())
          ")
            echo "name=$SLOT" >> "$GITHUB_OUTPUT"
            echo "force=false" >> "$GITHUB_OUTPUT"
            echo "trust=true" >> "$GITHUB_OUTPUT"
            echo "Resolved slot $SLOT (calendar-based, cron delay tolerant)"
          fi

      - name: Fail if schedule slot unknown
        if: github.event_name == 'schedule' && steps.slot.outputs.name == 'unknown'
        run: |
          echo "Could not resolve schedule slot from ET calendar"
          exit 1

      - name: Run market pipeline
        if: steps.slot.outputs.name != 'unknown'
        env:
          AGENT_MODE: pipeline
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          EXTRA=""
          if [ "${{ steps.slot.outputs.force }}" = "true" ]; then
            EXTRA="--force"
          elif [ "${{ steps.slot.outputs.trust }}" = "true" ]; then
            EXTRA="--trust-schedule"
          fi
          python scripts/scheduled_run.py "${{ steps.slot.outputs.name }}" $EXTRA

# Market agent — scheduled email reports (GitHub Actions)
#
# Required repository secrets:
#   RESEND_API_KEY  — Resend API key
#   EMAIL_FROM        — e.g. "Market Agent <reports@yourdomain.com>"
#   EMAIL_TO          — recipient address
#
# GitHub cron often starts ~52 min late (measured May 30 2026). Cron times below
# are set (target inbox time − 52 min). Slot = github.event.schedule → CRON_TO_SLOT.

name: Market Reports

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && format('Manual · {0}', inputs.slot)
    || (github.event.schedule == '30 15 * * 1-5' || github.event.schedule == '30 16 * * 1-5') && 'Daily AM · 2 broad emails'
    || (github.event.schedule == '12 22 * * 1-5' || github.event.schedule == '12 23 * * 1-5') && 'Daily PM · 2 broad emails'
    || (github.event.schedule == '14 14 * * 6' || github.event.schedule == '14 15 * * 6') && 'Weekly · broad + bullion'
    || (github.event.schedule == '8 22 28-31 * *' || github.event.schedule == '8 23 28-31 * *') && 'Monthly · broad + bullion'
    || format('Scheduled · {0}', github.event.schedule)
  }}

on:
  schedule:
    # Daily AM — job queued 10:30 AM Central (15:30 UTC CDT / 16:30 UTC CST), Mon–Fri
    - cron: "30 15 * * 1-5"
    - cron: "30 16 * * 1-5"
    # Daily PM — inbox 19:04 ET; cron 18:12 ET (22:12 UTC EDT / 23:12 UTC EST), Mon–Fri
    - cron: "12 22 * * 1-5"
    - cron: "12 23 * * 1-5"
    # Weekly — inbox 10:06 AM Central; cron 9:14 AM Central (14:14 UTC CDT / 15:14 UTC CST)
    - cron: "14 14 * * 6"
    - cron: "14 15 * * 6"
    # Monthly — inbox 19:00 ET last day; cron 18:08 ET (22:08 UTC EDT / 23:08 UTC EST)
    - cron: "8 22 28-31 * *"
    - cron: "8 23 28-31 * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Report slot to run"
        required: true
        type: choice
        options:
          - daily-am
          - daily-pm
          - weekly
          - monthly
      force:
        description: "Skip ET time/day gates (manual test)"
        required: false
        type: boolean
        default: false

jobs:
  send-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Target inbox: 10:06 AM Central = 11:06 AM ET (daylight time)
      WEEKLY_SCHEDULE_HOUR: "11"
      WEEKLY_SCHEDULE_MINUTE: "6"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        env:
          GITHUB_CRON: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            echo "trust=false" >> "$GITHUB_OUTPUT"
          else
            SLOT=$(python -c "
          import os, sys
          sys.path.insert(0, '.')
          from scripts.scheduled_run import resolve_slot_from_cron
          print(resolve_slot_from_cron(os.environ['GITHUB_CRON']))
          ")
            echo "name=$SLOT" >> "$GITHUB_OUTPUT"
            echo "force=false" >> "$GITHUB_OUTPUT"
            echo "trust=true" >> "$GITHUB_OUTPUT"
            echo "Cron '${{ github.event.schedule }}' -> slot $SLOT"
          fi

      - name: Fail if schedule slot unknown
        if: github.event_name == 'schedule' && steps.slot.outputs.name == 'unknown'
        run: |
          echo "Unknown cron: ${{ github.event.schedule }}"
          exit 1

      - name: Monthly last-day gate
        if: github.event_name == 'schedule' && steps.slot.outputs.name == 'monthly'
        id: monthly_gate
        run: |
          READY=$(python -c "
          import sys
          sys.path.insert(0, '.')
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from scripts.scheduled_run import _is_last_day_of_month
          now = datetime.now(ZoneInfo('America/New_York'))
          print('yes' if _is_last_day_of_month(now) else 'no')
          ")
          echo "ready=$READY" >> "$GITHUB_OUTPUT"
          if [ "$READY" = "no" ]; then
            echo "Expected — monthly cron fired before last calendar day in ET; no email today"
          fi

      - name: Run market pipeline
        if: steps.slot.outputs.name != 'unknown' && (steps.slot.outputs.name != 'monthly' || steps.monthly_gate.outputs.ready == 'yes')
        env:
          AGENT_MODE: pipeline
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          EXTRA=""
          if [ "${{ steps.slot.outputs.force }}" = "true" ]; then
            EXTRA="--force"
          elif [ "${{ steps.slot.outputs.trust }}" = "true" ]; then
            EXTRA="--trust-schedule"
          fi
          python scripts/scheduled_run.py "${{ steps.slot.outputs.name }}" $EXTRA
